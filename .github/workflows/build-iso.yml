name: Build ISO

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      fedora_release:
        description: 'Fedora release version'
        required: false
        default: '44'
        type: string

env:
  FEDORA_RELEASE: ${{ github.event.inputs.fedora_release || '44' }}

jobs:
  lint:
    name: Lint shell scripts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck build.sh

  build-iso:
    name: Build Live ISO
    needs: lint
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fedora container
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build ISO inside Fedora container
        run: |
          sudo podman run --rm --privileged \
            -v "${PWD}:/workspace:Z" \
            -w /workspace \
            docker.io/library/fedora:${{ env.FEDORA_RELEASE }} \
            bash -c '
              set -euo pipefail
              dnf install -y livecd-tools curl unzip wget

              mkdir -p /var/cache/live

              livecd-creator \
                --config /workspace/fedora-hyprland.ks \
                --fslabel Fedora-Hyprland-Remix-${{ env.FEDORA_RELEASE }} \
                --cache /var/cache/live \
                --tmpdir /workspace/tmp

              mkdir -p /workspace/output
              mv /workspace/Fedora-Hyprland-Remix-${{ env.FEDORA_RELEASE }}.iso /workspace/output/
            '

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: fedora-hyprland-remix-${{ env.FEDORA_RELEASE }}
          path: output/*.iso
          retention-days: 30
          compression-level: 0
